<div class="px-4 py-6 md:px-8 md:py-10 lg:px-12 max-w-[1200px] mx-auto">
  <h1 class="text-xl md:text-3xl font-bold text-gray-900 dark:text-gray-100 mb-6 md:mb-8 uppercase border-b-2 border-up-green pb-2 inline-block transition-colors duration-300">
    {{ displayTitle() }}
  </h1>

  @if (loading()) {
    <div class="flex justify-center items-center py-10">
      <div class="w-8 h-8 md:w-12 md:h-12 border-4 border-gray-200 dark:border-gray-700 border-t-up-green rounded-full animate-spin"></div>
    </div>
  } @else if (videos().length > 0) {
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8 mb-8">
      @for (video of videos(); track video.id) {
        <article class="flex flex-col group cursor-pointer">
          <a [routerLink]="['/video-article', video.id]" class="relative overflow-hidden rounded-xl aspect-video mb-3 bg-gray-900 flex items-center justify-center">
            <img [src]="getYoutubeThumbnail(video.videoLink)" [alt]="video.title" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 group-hover:scale-105 transition-all duration-300">
            <div class="absolute inset-0 flex items-center justify-center">
              <div class="w-12 h-12 bg-up-green/90 rounded-full flex items-center justify-center text-white shadow-lg group-hover:scale-110 transition-transform">
                <svg class="w-6 h-6 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              </div>
            </div>
          </a>
          <h2 class="text-base md:text-lg font-bold text-gray-800 dark:text-gray-200 leading-tight group-hover:text-up-green dark:group-hover:text-up-green transition-colors mt-2">
            <a [routerLink]="['/video-article', video.id]">{{ video.title }}</a>
          </h2>
          <span class="text-xs text-gray-500 dark:text-gray-400 mt-2 transition-colors">{{ video.date | date:'dd.MM.yyyy' }}</span>
        </article>
      }
    </div>

    <div class="mt-8 md:mt-12 border-t border-gray-100 dark:border-gray-800 pt-6">
      <app-pagination
        [currentPage]="currentPage()"
        [visiblePages]="visiblePages()"
        [hasNextPage]="hasNextPage()"
        [pageSize]="pageSize()"
        (pageChange)="goToPage($event)"
        (pageSizeChange)="onPageSizeChange($event)"
      />
    </div>

  } @else {
    <div class="bg-gray-50 dark:bg-gray-800 text-center py-12 md:py-20 rounded-lg transition-colors duration-300">
      <p class="text-gray-500 dark:text-gray-400 text-sm md:text-base">У цьому розділі поки немає відео.</p>
    </div>
  }
</div>
