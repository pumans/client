<div class="bg-white border-b border-gray-200">
  <div class="max-w-[1200px] mx-auto px-4 py-3">
    @if (article) {
      <div class="flex items-center gap-2 text-[12px] md:text-sm text-gray-500 font-medium">
        <a routerLink="/" class="hover:text-up-green transition-colors">Головна</a>
        <svg class="w-3.5 h-3.5 fill-current" viewBox="0 0 24 24">
          <path d="M9.29 15.88L13.17 12 9.29 8.12c-.39-.39-.39-1.02 0-1.41.39-.39 1.02-.39 1.41 0l4.59 4.59c.39.39.39 1.02 0 1.41l-4.59 4.59c-.39.39-1.02.39-1.41 0-.38-.39-.39-1.03 0-1.42z"/>
        </svg>
        <span class="text-gray-400 line-clamp-1">{{ article.title }}</span>
      </div>
    }
  </div>
</div>

<div class="max-w-[1200px] mx-auto px-4 py-6 md:py-8">
  @if (article) {
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8">

      <article class="lg:col-span-9">
        <div class="bg-white rounded-sm shadow-sm border border-gray-100">
          <div class="p-5 md:p-8">

            <div class="flex flex-wrap items-center gap-3 md:gap-4 text-[12px] md:text-sm text-gray-500 font-medium mb-4 uppercase tracking-wider">
              <span>{{ article.date | date:'d MMMM yyyy' }}</span>
              <span class="hidden md:inline text-gray-300">|</span>
              <span>{{ article.date | date:'HH:mm' }}</span>
            </div>

            <h1 class="text-2xl md:text-3xl lg:text-4xl font-bold text-gray-900 leading-tight mb-6">
              {{ article.title }}
            </h1>

            @if (article.imageUrl && article.imageUrl !== '/upload/null/null') {
              <div class="mb-8">
                <div class="aspect-video w-full rounded-sm overflow-hidden bg-gray-100">
                  <img [src]="'http://localhost:3000' + article.imageUrl"
                       [alt]="article.title"
                       class="w-full h-full object-cover">
                </div>
              </div>
            }

            <div class="text-[15px] md:text-base lg:text-lg text-gray-800 leading-relaxed font-serif"
                 [innerHTML]="article.content">
            </div>

          </div>
        </div>
      </article>

      <div class="lg:col-span-3">
        <app-sidebar-right></app-sidebar-right>
      </div>
    </div>
  } @else {
    <div class="flex justify-center items-center h-64">
      <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-up-green"></div>
    </div>
  }
</div>
