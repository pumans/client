<div class="px-4 py-6 md:py-8 lg:px-8 max-w-[1400px] mx-auto">

  <nav class="flex items-center text-[11px] md:text-xs text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-6 md:mb-8">
    <a routerLink="/" class="hover:text-up-green transition-colors">Головна</a>
    <span class="mx-2">/</span>
    <span class="text-gray-900 dark:text-gray-100">{{ displayTitle() }}</span>
  </nav>

  <div class="grid grid-cols-1 lg:grid-cols-4 gap-8 lg:gap-0">

    <div class="lg:col-span-3 lg:pr-8">
      <h1 class="text-2xl md:text-3xl font-bold text-gray-900 dark:text-gray-100 mb-6 md:mb-8 uppercase">
        {{ displayTitle() }}
      </h1>

      @if (loading()) {
        <div class="flex justify-center items-center py-10">
          <div class="w-8 h-8 md:w-12 md:h-12 border-4 border-gray-200 dark:border-gray-700 border-t-up-green rounded-full animate-spin"></div>
        </div>
      }
      @else if (articles().length > 0) {

        <div class="grid grid-cols-1 md:grid-cols-2">
          @for (article of articles(); track article.id; let index = $index) {
            <article class="group flex flex-col pb-6 mb-6 md:pb-8 md:mb-8 border-b border-gray-200 dark:border-gray-800"
                     [class.md:border-r]="index % 2 === 0"
                     [class.md:pr-6]="index % 2 === 0"
                     [class.md:pl-6]="index % 2 !== 0">

              <a [routerLink]="['/article', article.id]" class="block overflow-hidden aspect-video bg-gray-100 dark:bg-gray-800 mb-4">
                <img [src]="article.imageUrl ? 'http://127.0.0.1:3000' + article.imageUrl : '/assets/placeholder.jpg'"
                     [alt]="article.title"
                     class="w-full h-full object-contain transition-transform duration-500 group-hover:scale-105">
              </a>

              <div class="text-[11px] md:text-xs tracking-wide uppercase text-gray-500 dark:text-gray-400 mb-2">
                {{ article.date | date:'dd.MM.yyyy' }}
              </div>

              <h2 class="text-lg md:text-xl font-bold text-gray-900 dark:text-gray-100 leading-tight md:leading-snug transition-colors group-hover:text-up-green line-clamp-3">
                <a [routerLink]="['/article', article.id]">
                  {{ article.title }}
                </a>
              </h2>
            </article>
          }
        </div>

        <div class="mt-4 md:mt-8 pt-6 border-t border-gray-200 dark:border-gray-800">
          <app-simple-pagination
            [currentPage]="currentPage()"
            [visiblePages]="visiblePages()"
            [hasNextPage]="hasNextPage()"
            (pageChange)="goToPage($event)"
          />
        </div>

      } @else {
        <div class="text-center py-12 md:py-20 border-t border-gray-200 dark:border-gray-800">
          <p class="text-[11px] md:text-xs tracking-wide uppercase text-gray-500 dark:text-gray-400">У цьому розділі поки немає публікацій.</p>
        </div>
      }
    </div>

    <aside class="lg:col-span-1 lg:pl-8 lg:border-l border-gray-200 dark:border-gray-800 pt-8 lg:pt-0 border-t lg:border-t-0">
      <app-sidebar-right
        [showJudicialTruth]="currentCategorySlug() !== 'judicial_truth'"
        [showCourtStories]="currentCategorySlug() !== 'court_stories'">
      </app-sidebar-right>
    </aside>

  </div>
</div>
