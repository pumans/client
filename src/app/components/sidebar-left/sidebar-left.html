<aside class="space-y-6">
  <div class="bg-white rounded-sm shadow-sm border border-gray-100 overflow-hidden">

    <div class="bg-up-dark text-white px-4 py-3 border-t-2">
      <h3 class="text-[13px] md:text-sm font-bold uppercase tracking-wide">
        Останні новини
      </h3>
    </div>

    <div class="p-2 md:p-5">
      <div class="flex flex-col gap-4">
        @for (section of sections; track section.title) {
          @for (news of section.articles; track news.id; let isLast = $last) {
            <a [routerLink]="['/news', news.id]"
               class="group flex flex-col gap-2 text-sm mb-4 border-b border-gray-50 pb-4 last:border-0">

              <div class="flex items-center gap-1.5 text-gray-400 text-[11px]">
                <svg class="w-3 h-3 fill-current" viewBox="0 0 24 24"><path d="M12 2C6.486 2 2 6.486 2 12s4.486 10 10 10 10-4.486 10-10S17.514 2 12 2zm0 18c-4.411 0-8-3.589-8-8s3.589-8 8-8 8 3.589 8 8-3.589 8-8 8z"/><path d="M13 7h-2v6l5.2 3L17 14.7l-4-2.3V7z"/></svg>
                {{ news.date | date:'dd.MM.yyyy HH:mm' }}
              </div>

              <span class="text-gray-800 group-hover:text-up-green transition-colors font-medium leading-tight">
                {{ news.title }}
              </span>
            </a>
          }
        }
      </div>
    </div>
    <div class="bg-gray-50 border-t border-gray-100 p-3 text-center">
      <a href="/news" class="text-xs font-bold text-gray-500 hover:text-up-green transition-colors uppercase tracking-wider">
        Всі новини
      </a>
    </div>

  </div>
</aside>
