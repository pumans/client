<header class="font-sans relative z-50">

  <div class="bg-up-green dark:bg-up-dark dark:border-b dark:border-gray-800 py-3 md:py-5 relative z-20 transition-colors duration-300">
    <div class="max-w-[1400px] mx-auto px-4 flex justify-between items-center gap-3 md:gap-5">

      <a href="/" class="shrink-0 block">
        <img src="/logo.png" alt="Українське Право" class="h-10 md:h-14 w-auto object-contain">
      </a>

      <div class="flex-grow md:hidden"></div>

      <div class="hidden md:flex md:flex-grow max-w-xl mx-4">
        <div class="relative w-full flex rounded shadow-sm overflow-hidden bg-white dark:bg-gray-800 transition-colors duration-300">
          <input
            type="text"
            placeholder="Пошук новин..."
            class="w-full px-4 py-2.5 text-base text-gray-700 dark:text-gray-200 dark:placeholder-gray-400 outline-none border-none bg-transparent"
          >
          <button class="bg-gray-100 dark:bg-gray-700 hover:bg-up-dark dark:hover:bg-up-green text-gray-600 dark:text-gray-300 hover:text-white px-6 transition-colors border-none cursor-pointer flex items-center justify-center">
            <svg
              class="w-5 h-5 fill-none stroke-current stroke-2 transition-colors group-hover:text-up-green dark:group-hover:text-white"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <path d="M21 21l-4.35-4.35"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="hidden md:flex items-center gap-4 shrink-0 px-4">

        <a href="https://www.facebook.com/UkrainePravoCOM#" class="text-white/70 hover:text-white transition-colors duration-300">
          <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
            <path d="M14 13.5h2.5l1-4H14v-2c0-1.03 0-2 2-2h1.5V2.14c-.326-.043-1.557-.14-2.857-.14C11.928 2 10 3.657 10 6.7v2.8H7v4h3V22h4v-8.5z"/>
          </svg>
        </a>

        <a href="https://www.youtube.com/channel/UC2izB7amfEfNcU3lnv8lWDA/videos" class="text-white/70 hover:text-white transition-colors duration-300">
          <svg class="w-[22px] h-[22px] fill-current" viewBox="0 0 24 24">
            <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
          </svg>
        </a>

        <a href="https://www.linkedin.com/company/%D1%83%D0%BA%D1%80%D0%B0%D1%97%D0%BD%D1%81%D1%8C%D0%BA%D0%B5-%D0%BF%D1%80%D0%B0%D0%B2%D0%BE---%D0%BF%D0%BE%D1%80%D1%82%D0%B0%D0%BB-%D1%8E%D1%80%D0%B8%D0%B4%D0%B8%D1%87%D0%BD%D0%B8%D1%85-%D0%BD%D0%BE%D0%B2%D0%B8%D0%BD?trk=biz-companies-cym" target="_blank" rel="noopener noreferrer" class="text-white/70 hover:text-white transition-colors duration-300">
          <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
            <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
          </svg>
        </a>

      </div>

      <button
        (click)="themeService.toggleTheme()"
        class="p-2 rounded-full hover:bg-white/10 dark:hover:bg-white/10 transition-colors cursor-pointer text-white/70 hover:text-white">

        @if (!themeService.isDarkMode()) {
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        } @else {
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
        }
      </button>

      <div class="shrink-0">
        <button class="flex items-center gap-2 md:gap-2.5 bg-transparent border-none cursor-pointer text-white/70 hover:text-white transition-colors">
          <svg class="w-5 h-5 md:w-6 md:h-6 fill-current" viewBox="0 0 24 24">
            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
          </svg>
          <span class="hidden md:block font-semibold tracking-wide uppercase text-sm md:text-base">Увійти</span>
        </button>
      </div>

      <div class="flex items-center gap-4 shrink-0">
        <button
          (click)="toggleMobileMenu()"
          class="md:hidden flex items-center justify-center bg-transparent border-none p-2 ml-2 cursor-pointer group w-10 h-10">

          @if (isMobileMenuOpen) {
            <div class="relative w-6 h-6 flex items-center justify-center">
              <span class="absolute w-full h-[2px] bg-white group-hover:bg-up-dark dark:group-hover:bg-up-green transition-colors rotate-45 rounded-sm"></span>
              <span class="absolute w-full h-[2px] bg-white group-hover:bg-up-dark dark:group-hover:bg-up-green transition-colors -rotate-45 rounded-sm"></span>
            </div>
          } @else {
            <div class="flex flex-col justify-between w-6 h-4">
              <span class="w-full h-[2px] bg-white group-hover:bg-up-dark dark:group-hover:bg-up-green transition-colors rounded-sm"></span>
              <span class="w-full h-[2px] bg-white group-hover:bg-up-dark dark:group-hover:bg-up-green transition-colors rounded-sm"></span>
              <span class="w-full h-[2px] bg-white group-hover:bg-up-dark dark:group-hover:bg-up-green transition-colors rounded-sm"></span>
            </div>
          }

        </button>
      </div>

    </div>
  </div>

  <app-navigation [isMobileMenuOpen]="isMobileMenuOpen"
                  (closeMenu)="isMobileMenuOpen = false"
  ></app-navigation>

</header>
