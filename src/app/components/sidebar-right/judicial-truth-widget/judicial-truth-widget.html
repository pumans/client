@if (article(); as item) {
  <div
    class="mb-8 pb-8 border-b border-gray-200 dark:border-gray-800 last:border-b-0 last:pb-0 last:mb-0"
  >
    <div class="mb-4 border-b-2 border-gray-900 dark:border-gray-100 pb-1 inline-flex self-start">
      <a
        routerLink="/judicial_truth"
        class="font-bold text-gray-900 dark:text-gray-100 text-[13px] uppercase tracking-wide hover:text-up-green dark:hover:text-up-green transition-colors"
      >
        Судова правда
      </a>
    </div>

    <a [routerLink]="['/article', item.id]" class="group block">
      <div
        class="aspect-video overflow-hidden mb-3 bg-gray-100 dark:bg-gray-800 transition-colors duration-300 flex items-center justify-center"
      >
        <img
          [src]="item.imageUrl ? 'http://127.0.0.1:3000' + item.imageUrl : '/assets/placeholder.jpg'"
          [alt]="item.title"
          class="w-full h-full object-contain transition-transform duration-500 group-hover:scale-105"
        />
      </div>

      <div class="text-[11px] md:text-xs tracking-wide uppercase text-gray-500 dark:text-gray-400 mb-2">
        {{ item.date | date: 'dd.MM.yyyy' }}
      </div>

      <h3 class="text-[16px] md:text-[18px] font-bold text-gray-900 dark:text-gray-100 leading-tight group-hover:text-up-green transition-colors">
        {{ item.title }}
      </h3>
    </a>
  </div>
}
