<div class="flex flex-col gap-6 md:gap-8">

  @for (section of sections; track section.title) {
    <section class="bg-white rounded-sm shadow-sm border border-gray-100 overflow-hidden">

      <div class="border-b-2 border-up-green px-4 py-3 md:px-5 md:py-3.5 bg-white flex justify-between items-center">
        <h2 class="font-bold text-up-dark text-sm md:text-base uppercase tracking-wide">
          {{ section.title }}
        </h2>
        <a href="#" class="text-xs text-gray-400 hover:text-up-green transition-colors uppercase font-semibold">
          Всі новини <i class="fas fa-chevron-right ml-1 text-[10px]"></i>
        </a>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-0">

        @for (article of section.articles; track article.title; let isFirst = $first) {

          <a href="#"
             class="group block p-4 md:p-5 hover:bg-up-light transition-colors duration-300 border-gray-200"
             [class.border-b]="isFirst"
             [class.md:border-b-0]="isFirst"
             [class.md:border-r]="isFirst">

            <div class="aspect-video overflow-hidden rounded-sm mb-3.5 bg-gray-100">
              <img
                [src]="article.image"
                [alt]="article.title"
                class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
              />
            </div>

            <h3 class="text-[14px] md:text-[15px] font-semibold text-gray-900 group-hover:text-up-green transition-colors leading-snug line-clamp-3">
              {{ article.title }}
            </h3>

          </a>

        }
      </div>

    </section>
  }

</div>
