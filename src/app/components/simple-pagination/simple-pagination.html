<div class="flex flex-col md:flex-row justify-center items-center gap-4 md:gap-6 mt-8">
  <div class="flex items-center gap-2">
    <button
      (click)="onPrev()"
      [disabled]="currentPage() === 1"
      class="px-3 py-1.5 md:px-4 md:py-2 text-[12px] md:text-[13px] rounded-full border border-gray-300 bg-white text-gray-700 cursor-pointer transition-all hover:border-up-green hover:text-up-green disabled:opacity-50 disabled:cursor-default disabled:hover:border-gray-300 disabled:hover:text-gray-700"
    >
      ‹ Попередня
    </button>

    <div class="flex items-center gap-1">
      @for (p of visiblePages(); track p) {
        <button
          (click)="goToPage(p)"
          class="w-7 h-7 md:w-8 md:h-8 flex items-center justify-center rounded-full border text-[12px] md:text-[13px] cursor-pointer transition-all"
          [class.border-gray-300]="p !== currentPage()"
          [class.bg-white]="p !== currentPage()"
          [class.text-gray-600]="p !== currentPage()"
          [class.hover:border-up-green]="p !== currentPage()"
          [class.hover:text-up-green]="p !== currentPage()"
          [class.border-up-green]="p === currentPage()"
          [class.bg-up-green]="p === currentPage()"
          [class.text-white]="p === currentPage()"
        >
          {{ p }}
        </button>
      }
    </div>

    <button
      (click)="onNext()"
      [disabled]="!hasNextPage()"
      class="px-3 py-1.5 md:px-4 md:py-2 text-[12px] md:text-[13px] rounded-full border border-gray-300 bg-white text-gray-700 cursor-pointer transition-all hover:border-up-green hover:text-up-green disabled:opacity-50 disabled:cursor-default disabled:hover:border-gray-300 disabled:hover:text-gray-700"
    >
      Наступна ›
    </button>
  </div>
</div>
