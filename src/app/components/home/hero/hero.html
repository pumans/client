@for (article of featuredArticles(); track article.title; let i = $index) {
  @if (i === 0) {
    <div class="lg:col-span-3 flex flex-col lg:flex-row gap-4 lg:gap-6 group border-b border-gray-200 dark:border-gray-800 pb-6 md:pb-8">

      <div class="w-full lg:w-[40%] flex flex-col">

        <div class="border-b-2 border-gray-900 dark:border-gray-100 pb-1 inline-flex self-start mb-6 md:mb-8 relative z-10">
          <a routerLink="/accent" class="text-xl md:text-2xl font-bold text-gray-900 dark:text-gray-100 uppercase tracking-wide hover:text-up-green dark:hover:text-up-green transition-colors">
            Акценти
          </a>
        </div>

        <a [routerLink]="['/article', article.id]" class="flex flex-col justify-center flex-grow block">
          <span class="text-gray-500 dark:text-gray-400 text-[11px] md:text-xs mb-2 tracking-wide uppercase">
            {{ article.category }}
          </span>
          <h2 class="text-2xl md:text-3xl lg:text-4xl font-bold text-gray-900 dark:text-gray-100 group-hover:text-up-green dark:group-hover:text-up-green transition-colors leading-tight mb-3">
            {{ article.title }}
          </h2>
        </a>

      </div>

      <a [routerLink]="['/article', article.id]" class="w-full lg:w-[60%] aspect-video relative overflow-hidden bg-gray-100 dark:bg-gray-800 flex items-center justify-center block">
        <img
          [src]="article.image"
          [alt]="article.title"
          class="w-full h-full object-contain group-hover:scale-105 transition-transform duration-500"
        />
      </a>
    </div>
  } @else {
    <a [routerLink]="['/article', article.id]" class="lg:col-span-1 flex flex-col gap-3 pt-4 lg:pt-0 border-t border-gray-200 dark:border-gray-800 lg:border-t-0 group">

      <div class="aspect-video relative overflow-hidden bg-gray-100 dark:bg-gray-800 flex items-center justify-center">
        <img
          [src]="article.image"
          [alt]="article.title"
          class="w-full h-full object-contain group-hover:scale-105 transition-transform duration-500"
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <span class="text-gray-500 dark:text-gray-400 text-[11px] md:text-xs tracking-wide uppercase">
          {{ article.category }}
        </span>
        <h3 class="text-[16px] md:text-[18px] lg:text-[19px] font-bold text-gray-900 dark:text-gray-100 group-hover:text-up-green dark:group-hover:text-up-green transition-colors leading-snug line-clamp-3">
          {{ article.title }}
        </h3>
      </div>
    </a>
  }
}
