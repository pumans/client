<section class="flex flex-col">
  <div class="mb-6 lg:mb-8 border-b-2 border-gray-900 dark:border-gray-100 pb-2">
    <a routerLink="/man_law" class="font-bold text-gray-900 dark:text-gray-100 text-xl md:text-2xl uppercase tracking-wide hover:text-up-green dark:hover:text-up-green transition-colors">
      Право в особах
    </a>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-y-8 md:gap-0">
    @for (item of articles(); track item.id; let isLast = $last; let isFirst = $first) {

      <a [routerLink]="['/article', item.id]"
         class="group flex flex-col gap-3 transition-colors duration-300 pb-6 md:pb-0 border-b border-gray-200 dark:border-gray-800 md:border-b-0"
         [class.lg:border-r]="!isLast"
         [class.lg:pr-6]="!isLast"
         [class.lg:pl-6]="!isFirst">

        <div class="overflow-hidden mb-2 flex justify-center">
          <img [src]="item.imageUrl ? 'http://127.0.0.1:3000' + item.imageUrl : '/assets/placeholder-person.jpg'"
               [alt]="item.title"
               class="w-[75%] lg:w-[85%] xl:w-[75%] h-auto object-contain grayscale opacity-90 group-hover:grayscale-0 group-hover:opacity-100 group-hover:scale-105 transition-all duration-500">
        </div>

        <div class="flex flex-col gap-1.5 px-1">
          @if (item.date) {
            <span class="text-gray-500 dark:text-gray-400 text-[12px] tracking-wide">
              {{ item.date | date:'dd.MM.yyyy' }}
            </span>
          }

          <h3 class="text-[16px] md:text-[18px] font-bold text-gray-900 dark:text-gray-100 group-hover:text-up-green dark:group-hover:text-up-green transition-colors leading-snug">
            {{ item.title }}
          </h3>

          @if (item.previewText) {
            <div class="text-[13px] md:text-[14px] text-gray-600 dark:text-gray-300 leading-snug mt-1"
                 [innerHTML]="item.previewText">
            </div>
          }
        </div>
      </a>

    }
  </div>
</section>
